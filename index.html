<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Мы Смотрим</title>

  <link rel="stylesheet" href="style.css" />

  <link rel="manifest" href="manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="bg-blur blur-1"></div>
  <div class="bg-blur blur-2"></div>

  <main class="container">

    <header class="hero">
      <h1>Мы Смотрим</h1>

      <p>
        Яна ❤️ Юра
      </p>
    </header>

    <section class="stats">

      <div class="stat-card">
        <span>🎬 Всего</span>
        <h2 id="totalCount">0</h2>
      </div>

      <div class="stat-card">
        <span>✅ Посмотрели</span>
        <h2 id="watchedCount">0</h2>
      </div>

      <div class="stat-card">
        <span>🍿 Осталось</span>
        <h2 id="leftCount">0</h2>
      </div>

    </section>

    <section class="progress-section">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div class="progress-text" id="progressText">
        Вы посмотрели 0%
      </div>
    </section>

    <section class="search-box">

      <input
        type="text"
        id="movieSearch"
        placeholder="Найти фильм или сериал..."
      />

      <div id="searchResults" class="search-results"></div>

    </section>

    <section class="random-box">
      <button id="randomBtn">
        🎲 Выбрать вечер
      </button>

      <div id="randomResult"></div>
    </section>

    <section class="category-section">
      <div class="section-title">
        🍿 К просмотру
      </div>

      <div id="movieGrid" class="movie-grid"></div>
    </section>

    <section class="category-section watched-section">
      <div class="section-title">
        ✅ Уже посмотрели
      </div>

      <div id="watchedGrid" class="movie-grid"></div>
    </section>

  </main>

  <script type="module" src="app.js"></script>

</body>
</html>
