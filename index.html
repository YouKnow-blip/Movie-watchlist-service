<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>❤️ Яна и Юра смотрят фильмы</title>

  <style>

    :root{
      --bg:#0f172a;
      --card:rgba(17,24,39,0.85);
      --border:rgba(255,255,255,0.08);
      --pink:#ec4899;
      --purple:#8b5cf6;
      --green:#4ade80;
      --text:#ffffff;
      --muted:#94a3b8;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Inter,sans-serif;
    }

    body{
      background:
        radial-gradient(circle at top left, rgba(236,72,153,0.15), transparent 25%),
        radial-gradient(circle at bottom right, rgba(139,92,246,0.15), transparent 25%),
        var(--bg);

      color:var(--text);
      min-height:100vh;
      padding:40px 20px;
    }

    body.netflix-theme{
      --bg:#000000;
      --card:rgba(20,20,20,0.95);
      --border:rgba(255,255,255,0.06);
      --pink:#e50914;
      --purple:#b20710;
      --green:#46d369;
      --text:#ffffff;
      --muted:#9ca3af;
    }

    .container{
      max-width:1400px;
      margin:auto;
    }

    h1{
      text-align:center;
      font-size:52px;
      margin-bottom:15px;
    }

    .subtitle{
      text-align:center;
      color:var(--muted);
      margin-bottom:35px;
      font-size:20px;
    }

    .theme-buttons{
      display:flex;
      justify-content:center;
      gap:12px;
      margin-bottom:40px;
      flex-wrap:wrap;
    }

    .main-btn{
      border:none;
      border-radius:14px;
      background:linear-gradient(
        135deg,
        var(--pink),
        var(--purple)
      );
      color:white;
      padding:14px 18px;
      cursor:pointer;
      font-weight:700;
      transition:0.2s;
    }

    .main-btn:hover{
      transform:scale(1.05);
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-bottom:35px;
    }

    .stat-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:24px;
      padding:25px;
      backdrop-filter:blur(12px);
      text-align:center;
      box-shadow:0 10px 25px rgba(0,0,0,0.25);
    }

    .stat-card h3{
      color:var(--muted);
      margin-bottom:10px;
      font-size:16px;
    }

    .stat-card div{
      font-size:40px;
      font-weight:bold;
    }

    .progress-wrapper{
      margin-bottom:45px;
    }

    .progress-bar{
      height:18px;
      background:#1e293b;
      border-radius:999px;
      overflow:hidden;
    }

    .progress-fill{
      height:100%;
      width:0%;
      background:linear-gradient(
        135deg,
        var(--pink),
        var(--purple)
      );
      transition:0.3s;
    }

    .progress-text{
      margin-top:10px;
      text-align:center;
      color:var(--muted);
    }

    .calendar-section{
      margin-bottom:55px;
    }

    .calendar-title{
      font-size:30px;
      margin-bottom:20px;
    }

    .heatmap{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:10px;
    }

    .heat-day{
      background:#1e293b;
      border-radius:18px;
      min-height:95px;
      padding:12px;
      transition:0.2s;
      position:relative;
      overflow:hidden;
    }

    .heat-day:hover{
      transform:scale(1.04);
    }

    .heat-level-1{
      background:#312e81;
    }

    .heat-level-2{
      background:#7c3aed;
    }

    .heat-level-3{
      background:#db2777;
    }

    .heat-level-4{
      background:#ef4444;
    }

    .heat-emoji{
      font-size:28px;
      margin-top:10px;
    }

    .heat-date{
      font-size:13px;
      color:#cbd5e1;
    }

    .heat-count{
      position:absolute;
      bottom:10px;
      right:12px;
      font-size:12px;
      color:#e2e8f0;
    }

    .add-form{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:24px;
      padding:25px;
      margin-bottom:45px;
      backdrop-filter:blur(12px);
    }

    .form-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:15px;
    }

    input,
    select{
      padding:14px;
      border-radius:14px;
      border:none;
      background:#1e293b;
      color:white;
      font-size:15px;
      width:100%;
    }

    #searchResults{
      margin-top:10px;
      display:grid;
      gap:10px;
    }

    .search-item{
      background:#1e293b;
      padding:10px;
      border-radius:14px;
      cursor:pointer;
      display:flex;
      gap:12px;
      align-items:center;
    }

    .search-item img{
      width:55px;
      height:80px;
      object-fit:cover;
      border-radius:10px;
    }

    .random-box{
      text-align:center;
      margin-bottom:50px;
    }

    #randomResult{
      margin-top:20px;
      font-size:28px;
      font-weight:bold;
    }

    .category{
      margin-bottom:60px;
    }

    .category h2{
      margin-bottom:20px;
      font-size:32px;
    }

    .movie-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:20px;
    }

    .movie-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:24px;
      padding:18px;
      display:flex;
      gap:16px;
      align-items:flex-start;
      box-shadow:0 10px 25px rgba(0,0,0,0.3);
      transition:0.25s;
    }

    .movie-card:hover{
      transform:translateY(-6px);
    }

    .movie-poster{
      width:90px;
      min-width:90px;
      height:130px;
      object-fit:cover;
      border-radius:18px;
    }

    .movie-info{
      flex:1;
    }

    .movie-title{
      font-size:22px;
      font-weight:bold;
      margin-bottom:10px;
    }

    .movie-desc{
      color:var(--muted);
      margin-bottom:15px;
      line-height:1.5;
      font-size:14px;
    }

    .movie-meta{
      margin-bottom:14px;
      font-size:14px;
      color:#cbd5e1;
    }

    .movie-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .watch-btn,
    .fav-btn,
    .delete-btn{
      border:none;
      border-radius:12px;
      padding:10px 14px;
      cursor:pointer;
      font-size:13px;
      font-weight:600;
      transition:0.2s;
    }

    .watch-btn:hover,
    .fav-btn:hover,
    .delete-btn:hover{
      transform:scale(1.05);
    }

    .watch-btn{
      background:linear-gradient(135deg,#4ade80,#22c55e);
      color:#052e16;
    }

    .fav-btn{
      background:#27272a;
      color:white;
    }

    .active-fav{
      background:linear-gradient(
        135deg,
        var(--pink),
        var(--purple)
      );
    }

    .delete-btn{
      background:linear-gradient(
        135deg,
        #ef4444,
        #dc2626
      );
      color:white;
    }

    .reactions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:15px;
    }

    .react-btn{
      background:rgba(255,255,255,0.06);
      color:white;
      border:none;
      border-radius:999px;
      padding:7px 11px;
      font-size:13px;
      cursor:pointer;
      transition:0.2s;
      display:flex;
      align-items:center;
      gap:6px;
    }

    .react-btn:hover{
      transform:scale(1.08);
      background:rgba(255,255,255,0.12);
    }

    .react-btn.active{
      background:linear-gradient(
        135deg,
        var(--pink),
        var(--purple)
      );
    }

    .comment-input{
      margin-top:10px;
    }

    .comment{
      background:rgba(255,255,255,0.05);
      padding:12px;
      border-radius:14px;
      margin-top:10px;
    }

    .comment-top{
      display:flex;
      justify-content:space-between;
      margin-bottom:6px;
      color:#94a3b8;
      font-size:13px;
    }

    @media(max-width:768px){

      h1{
        font-size:38px;
      }

      .movie-card{
        flex-direction:column;
      }

      .movie-poster{
        width:100%;
        height:260px;
      }

      .heatmap{
        grid-template-columns:repeat(3,1fr);
      }

    }

  </style>
</head>

<body>

<div class="container">

  <h1>❤️ Яна и Юра смотрят фильмы ❤️</h1>

  <p class="subtitle">
    Ваш уютный кино-дневник 🍿
  </p>

  <div class="theme-buttons">

    <button class="main-btn" id="themeNetflix">
      🎬 Netflix Dark
    </button>

    <button class="main-btn" id="themePink">
      🌸 Pink Night
    </button>

  </div>

  <div class="stats">

    <div class="stat-card">
      <h3>🎬 Всего</h3>
      <div id="totalCount">0</div>
    </div>

    <div class="stat-card">
      <h3>✅ Посмотрели</h3>
      <div id="watchedCount">0</div>
    </div>

    <div class="stat-card">
      <h3>❤️ Избранное</h3>
      <div id="favCount">0</div>
    </div>

  </div>

  <div class="progress-wrapper">

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="progress-text" id="progressText">
      Вы посмотрели 0% списка
    </div>

  </div>

  <div class="calendar-section">

    <div class="calendar-title">
      🔥 Heatmap ваших вечеров
    </div>

    <div class="heatmap" id="heatmap"></div>

  </div>

  <div class="add-form">

    <h2 style="margin-bottom:20px">
      ➕ Добавить фильм
    </h2>

    <div class="form-grid">

      <div>

        <input
          id="titleInput"
          placeholder="Название фильма"
        >

        <div id="searchResults"></div>

      </div>

      <input
        id="descInput"
        placeholder="Описание"
      >

      <select id="categoryInput">
        <option>😂 Комедии</option>
        <option>❤️ Романтическое</option>
        <option>🔥 Телешоу</option>
        <option>🍿 Под чипсы</option>
        <option>🎬 Сериалы</option>
      </select>

      <input
        id="authorInput"
        placeholder="Кто добавил"
      >

      <button class="main-btn" id="addBtn">
        Добавить
      </button>

    </div>

  </div>

  <div class="random-box">

    <button class="main-btn" id="randomBtn">
      🎲 Выбрать случайный фильм
    </button>

    <div id="randomResult"></div>

  </div>

  <div id="categories"></div>

  <div class="category">
    <h2>✅ Уже посмотрели</h2>
    <div class="movie-grid" id="watchedGrid"></div>
  </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  deleteDoc,
  doc,
  updateDoc,
  onSnapshot,
  query,
  orderBy
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAjnuLCinerxH_q0IV28V_4GChZfB-g1Bg",
  authDomain: "movie-watchlist-7883c.firebaseapp.com",
  projectId: "movie-watchlist-7883c",
  storageBucket: "movie-watchlist-7883c.firebasestorage.app",
  messagingSenderId: "585421393583",
  appId: "1:585421393583:web:b3c62cb16d99d8e3a18e5a"
};

const TMDB_API =
"35a7c9cb588541cf79e297fbeb46e131";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const moviesRef = collection(db,"movies");
const commentsRef = collection(db,"comments");
const reactionsRef = collection(db,"reactions");

const categoriesContainer =
document.getElementById("categories");

const watchedGrid =
document.getElementById("watchedGrid");

const categoryMap = {};

let selectedPoster = "";

if(localStorage.getItem("theme") === "netflix"){
  document.body.classList.add("netflix-theme");
}

document.getElementById("themeNetflix")
.onclick = ()=>{

  document.body.classList.add("netflix-theme");

  localStorage.setItem("theme","netflix");

};

document.getElementById("themePink")
.onclick = ()=>{

  document.body.classList.remove("netflix-theme");

  localStorage.setItem("theme","pink");

};

function createCategory(title){

  if(categoryMap[title])
    return categoryMap[title];

  const section =
    document.createElement("div");

  section.className = "category";

  section.innerHTML = `
    <h2>${title}</h2>
    <div class="movie-grid"></div>
  `;

  categoriesContainer.appendChild(section);

  categoryMap[title] =
    section.querySelector(".movie-grid");

  return categoryMap[title];

}

function createMovieCard(movie,id){

  const card =
    document.createElement("div");

  card.className = "movie-card";

  card.innerHTML = `

    <img
      class="movie-poster"
      src="${
        movie.poster ||
        'https://via.placeholder.com/300x450?text=Movie'
      }"
    >

    <div class="movie-info">

      <div class="movie-title">
        ${movie.title}
      </div>

      <div class="movie-desc">
        ${movie.desc || "Описание скоро появится 🍿"}
      </div>

      <div class="movie-meta">
        👤 Добавил:
        ${movie.author || "кто-то из вас"}
      </div>

      <div class="movie-actions">

        <button class="watch-btn">
          ${
            movie.watched
            ? "✅ Просмотрено"
            : "✅ Посмотрели"
          }
        </button>

        <button class="fav-btn ${
          movie.favorite ? "active-fav" : ""
        }">
          ❤️
        </button>

        <button class="delete-btn">
          🗑️
        </button>

      </div>

      <div class="reactions">

        <button class="react-btn" data-emoji="❤️">
          ❤️ <span>0</span>
        </button>

        <button class="react-btn" data-emoji="😂">
          😂 <span>0</span>
        </button>

        <button class="react-btn" data-emoji="😭">
          😭 <span>0</span>
        </button>

        <button class="react-btn" data-emoji="🔥">
          🔥 <span>0</span>
        </button>

        <button class="react-btn" data-emoji="🔞">
          🔞 <span>0</span>
        </button>

      </div>

      <input
        class="comment-input"
        placeholder="Написать комментарий..."
      >

      <div class="comment-list"></div>

    </div>
  `;

  const watchBtn =
    card.querySelector(".watch-btn");

  const favBtn =
    card.querySelector(".fav-btn");

  const deleteBtn =
    card.querySelector(".delete-btn");

  const commentInput =
    card.querySelector(".comment-input");

  const commentList =
    card.querySelector(".comment-list");

  const reactButtons =
    card.querySelectorAll(".react-btn");

  watchBtn.onclick = async ()=>{

    await updateDoc(
      doc(db,"movies",id),
      {
        watched: !movie.watched,
        watchedAt: Date.now()
      }
    );

  };

  favBtn.onclick = async ()=>{

    await updateDoc(
      doc(db,"movies",id),
      {
        favorite: !movie.favorite
      }
    );

  };

  deleteBtn.onclick = async ()=>{

    await deleteDoc(
      doc(db,"movies",id)
    );

  };

  reactButtons.forEach(btn=>{

    btn.onclick = async ()=>{

      const emoji =
        btn.dataset.emoji;

      await addDoc(reactionsRef,{
        movieId:id,
        emoji,
        createdAt:Date.now()
      });

    };

  });

  onSnapshot(reactionsRef,(snapshot)=>{

    const counts = {};

    snapshot.forEach(docItem=>{

      const reaction =
        docItem.data();

      if(reaction.movieId !== id)
        return;

      counts[reaction.emoji] =
        (counts[reaction.emoji] || 0) + 1;

    });

    reactButtons.forEach(btn=>{

      const emoji =
        btn.dataset.emoji;

      const count =
        counts[emoji] || 0;

      btn.querySelector("span")
        .textContent = count;

      if(count > 0){
        btn.classList.add("active");
      }else{
        btn.classList.remove("active");
      }

    });

  });

  commentInput.addEventListener(
    "keypress",
    async(e)=>{

      if(e.key !== "Enter") return;

      if(!commentInput.value.trim())
        return;

      await addDoc(commentsRef,{
        movieId:id,
        text:commentInput.value,
        createdAt:Date.now()
      });

      commentInput.value = "";

  });

  onSnapshot(
    query(commentsRef,orderBy("createdAt")),
    snapshot=>{

      commentList.innerHTML = "";

      snapshot.forEach(docItem=>{

        const comment =
          docItem.data();

        if(comment.movieId !== id)
          return;

        const date =
          new Date(comment.createdAt)
          .toLocaleDateString("ru-RU",{
            day:"numeric",
            month:"short"
          });

        const div =
          document.createElement("div");

        div.className = "comment";

        div.innerHTML = `
          <div class="comment-top">
            <span>💬 Комментарий</span>
            <span>${date}</span>
          </div>

          <div>${comment.text}</div>
        `;

        commentList.appendChild(div);

      });

  });

  if(movie.watched){
    watchedGrid.appendChild(card);
  }else{
    createCategory(movie.category)
      .appendChild(card);
  }

}

function renderHeatmap(movies){

  const heatmap =
    document.getElementById("heatmap");

  heatmap.innerHTML = "";

  const watchedMovies =
    movies.filter(m=>m.watched);

  const daysMap = {};

  watchedMovies.forEach(movie=>{

    if(!movie.watchedAt) return;

    const date =
      new Date(movie.watchedAt)
      .toLocaleDateString("ru-RU");

    if(!daysMap[date]){

      daysMap[date] = {
        count:0,
        emoji:"🍿"
      };

    }

    daysMap[date].count++;

    if(movie.category.includes("❤️")){
      daysMap[date].emoji = "❤️";
    }

  });

  Object.entries(daysMap)
  .forEach(([date,data])=>{

    const day =
      document.createElement("div");

    let level = "heat-level-1";

    if(data.count >= 2)
      level = "heat-level-2";

    if(data.count >= 3)
      level = "heat-level-3";

    if(data.count >= 4)
      level = "heat-level-4";

    day.className =
      `heat-day ${level}`;

    day.innerHTML = `

      <div class="heat-date">
        ${date}
      </div>

      <div class="heat-emoji">
        ${data.emoji}
      </div>

      <div class="heat-count">
        ${data.count} фильм(а)
      </div>

    `;

    heatmap.appendChild(day);

  });

}

function updateStats(movies){

  const total = movies.length;

  const watched =
    movies.filter(m=>m.watched).length;

  const favs =
    movies.filter(m=>m.favorite).length;

  document.getElementById("totalCount")
    .textContent = total;

  document.getElementById("watchedCount")
    .textContent = watched;

  document.getElementById("favCount")
    .textContent = favs;

  const percent = total
    ? Math.round((watched/total)*100)
    : 0;

  document.getElementById("progressFill")
    .style.width = percent + "%";

  document.getElementById("progressText")
    .textContent =
      `Вы посмотрели ${percent}% списка`;

}

onSnapshot(moviesRef,(snapshot)=>{

  categoriesContainer.innerHTML = "";
  watchedGrid.innerHTML = "";

  Object.keys(categoryMap)
    .forEach(key=>delete categoryMap[key]);

  const movies = [];

  snapshot.forEach((docItem)=>{

    const movie = docItem.data();

    movies.push(movie);

    createMovieCard(movie,docItem.id);

  });

  updateStats(movies);

  renderHeatmap(movies);

});

const titleInput =
document.getElementById("titleInput");

const descInput =
document.getElementById("descInput");

titleInput.addEventListener(
  "input",
  async ()=>{

    const query =
      titleInput.value.trim();

    if(query.length < 2){

      document.getElementById(
        "searchResults"
      ).innerHTML = "";

      return;

    }

    const response = await fetch(
      `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API}&language=ru-RU&query=${query}`
    );

    const data =
      await response.json();

    const results =
      data.results.slice(0,5);

    const searchResults =
      document.getElementById(
        "searchResults"
      );

    searchResults.innerHTML = "";

    results.forEach(movie=>{

      const div =
        document.createElement("div");

      div.className = "search-item";

      const poster =
        movie.poster_path
        ? `https://image.tmdb.org/t/p/w500${movie.poster_path}`
        : "";

      div.innerHTML = `

        <img src="${poster}">

        <div>

          <div style="font-weight:bold">
            ${movie.title}
          </div>

          <div style="
            color:#94a3b8;
            font-size:14px;
            margin-top:4px;
          ">
            ${movie.release_date || ""}
          </div>

        </div>
      `;

      div.onclick = ()=>{

        titleInput.value =
          movie.title;

        descInput.value =
          movie.overview || "";

        selectedPoster = poster;

        searchResults.innerHTML = "";

      };

      searchResults.appendChild(div);

    });

});

document.getElementById("addBtn")
.onclick = async ()=>{

  const title =
    titleInput.value.trim();

  const desc =
    descInput.value.trim();

  const category =
    document.getElementById(
      "categoryInput"
    ).value;

  const author =
    document.getElementById(
      "authorInput"
    ).value.trim();

  if(!title) return;

  await addDoc(moviesRef,{

    title,
    desc,
    category,
    author,

    poster:selectedPoster,

    watched:false,
    favorite:false,

    createdAt:Date.now()

  });

  titleInput.value = "";
  descInput.value = "";

  document.getElementById(
    "authorInput"
  ).value = "";

  selectedPoster = "";

};

document.getElementById("randomBtn")
.onclick = ()=>{

  const movies = [];

  document.querySelectorAll(".movie-card")
  .forEach(card=>{

    const watched =
      card.querySelector(".watch-btn")
      .textContent.includes("Просмотрено");

    if(!watched){

      movies.push(
        card.querySelector(".movie-title")
        .textContent
      );

    }

  });

  if(!movies.length){

    document.getElementById(
      "randomResult"
    ).innerHTML =
      "🍿 Вы уже всё посмотрели";

    return;

  }

  const random =
    movies[
      Math.floor(Math.random()*movies.length)
    ];

  document.getElementById(
    "randomResult"
  ).innerHTML =
    `
      🎬 Сегодня смотрите:
      <br><br>

      <span style="
        color:var(--pink);
        font-size:36px;
      ">
        ${random}
      </span>
    `;

};

</script>

</body>
</html>
