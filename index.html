<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Яна и Юра · кинозал</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f;--bg2:#14141f;--bg3:#1c1c2a;--line:#26263400;--line2:#262634;
  --txt:#f3f3f6;--muted:#8b8b9c;--gold:#e2b774;--accent:#d946ef;--good:#34d399;--bad:#f87171;
  --r:16px;--sh:0 12px 34px rgba(0,0,0,.5);
}
body.netflix-theme{--bg:#000;--bg2:#16100f;--bg3:#221715;--line2:#2a1d1b;--accent:#e50914}
body{
  font-family:'Plus Jakarta Sans',sans-serif;background:
   radial-gradient(900px 500px at 80% -5%,rgba(217,70,239,.14),transparent),
   radial-gradient(700px 500px at 0% 0%,rgba(226,183,116,.10),transparent),var(--bg);
  color:var(--txt);min-height:100vh;padding-bottom:96px;overflow-x:hidden;
}
h1,h2,h3,.serif{font-family:'Playfair Display',serif}
.container{max-width:560px;margin:0 auto;padding:14px 14px 0}
@keyframes floatIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes shine{to{background-position:200% center}}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
  gap:10px;padding:10px 14px;backdrop-filter:blur(14px);background:rgba(10,10,15,.6);border-bottom:1px solid var(--line2)}
.profile-chip{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--line2);
  padding:5px 12px 5px 5px;border-radius:99px;cursor:pointer}
.chip-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;border:1.5px solid var(--gold)}
.profile-chip span{font-weight:600;font-size:14px}
.topbar-right{position:relative}
.bell-btn{position:relative;background:var(--bg2);border:1px solid var(--line2);width:40px;height:40px;border-radius:12px;font-size:17px;cursor:pointer}
.notif-badge{position:absolute;top:-3px;right:-3px;min-width:17px;height:17px;background:var(--accent);border-radius:9px;
  font-size:10px;font-weight:700;color:#fff;display:none;align-items:center;justify-content:center;padding:0 4px}
.notif-dropdown{position:absolute;right:0;top:48px;width:300px;max-width:84vw;max-height:60vh;overflow-y:auto;
  background:var(--bg2);border:1px solid var(--line2);border-radius:14px;box-shadow:var(--sh);padding:8px;display:none}
.notif-dropdown.active{display:block;animation:floatIn .25s}
.notif-head{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;font-size:13px;color:var(--muted)}
.notif-head button{background:none;border:none;color:var(--gold);font-size:12px;cursor:pointer}
.notif-item{display:flex;gap:10px;padding:10px 8px;border-radius:10px;cursor:pointer}
.notif-item:hover{background:var(--bg3)}
.notif-item.unread{background:rgba(217,70,239,.08)}
.notif-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0}
.notif-sender{font-weight:700}
.notif-time,.notif-empty{font-size:11px;color:var(--muted)}
.notif-empty{text-align:center;padding:18px}

/* HERO */
.hero{text-align:center;padding:18px 0 12px}
.hero h1{font-size:30px;font-weight:800;background:linear-gradient(120deg,#fff 30%,var(--gold));
  background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shine 7s linear infinite}
.subtitle{color:var(--muted);font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.theme-row{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.theme-btn{background:var(--bg2);border:1px solid var(--line2);color:var(--txt);padding:7px 14px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer}
.theme-btn:active{transform:scale(.96)}

/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-card{background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r);padding:14px;text-align:center;animation:floatIn .5s both}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.stat-num{font-family:'Playfair Display',serif;font-size:30px;font-weight:800;background:linear-gradient(135deg,#fff,var(--gold));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-top:2px}
.progress{height:8px;background:var(--bg2);border-radius:99px;margin-top:14px;overflow:hidden;border:1px solid var(--line2)}
.progress-fill{height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--accent));
  background-size:200% auto;animation:shine 4s linear infinite;transition:width .6s}
.progress-text{text-align:center;font-size:12px;color:var(--muted);margin-top:6px}

/* ADD BOX */
.add-box{background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r);padding:14px;margin-top:18px;position:relative}
.add-box input,.add-box textarea,.add-box select{width:100%;background:var(--bg);border:1px solid var(--line2);
  color:var(--txt);padding:12px;border-radius:12px;font-size:14px;font-family:inherit;margin-bottom:10px;outline:none}
.add-box textarea{min-height:54px;resize:vertical}
.add-box input:focus,.add-box textarea:focus{border-color:var(--gold)}
.add-actions{display:flex;gap:8px}
.main-btn{flex:1;background:linear-gradient(135deg,var(--gold),#caa05f);color:#1a1206;border:none;padding:12px;
  border-radius:12px;font-weight:700;font-size:14px;cursor:pointer}
.ghost-btn{background:var(--bg3);border:1px solid var(--line2);color:var(--txt);padding:12px;border-radius:12px;font-weight:600;font-size:14px;cursor:pointer}
.main-btn:active,.ghost-btn:active{transform:scale(.97)}
.random-result{text-align:center;font-size:14px;color:var(--gold);margin-top:10px;min-height:0}
.search-results{position:absolute;left:14px;right:14px;top:56px;z-index:30;background:var(--bg3);border:1px solid var(--line2);
  border-radius:12px;overflow:hidden;max-height:300px;overflow-y:auto}
.search-results:empty{display:none}
.search-item{display:flex;gap:10px;padding:8px;cursor:pointer;align-items:center}
.search-item:hover{background:var(--bg2)}
.search-item img{width:38px;height:56px;object-fit:cover;border-radius:6px;background:var(--bg)}
.search-item .si-y{color:var(--muted);font-size:12px}

/* SECTION TITLES */
.cat-title{font-size:17px;font-weight:700;margin:20px 4px 10px}
.section-toggle{width:100%;text-align:left;background:var(--bg2);border:1px solid var(--line2);color:var(--txt);
  padding:13px 14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:20px;display:flex;justify-content:space-between;align-items:center}
.section-toggle .arr{transition:transform .3s;color:var(--muted)}
.section-toggle.open .arr{transform:rotate(180deg)}
.movie-grid{display:flex;flex-direction:column;gap:10px;margin-top:10px}
.movie-grid.hidden{display:none}

/* COMPACT MOVIE CARD */
.mcard{background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r);overflow:hidden;animation:floatIn .45s both}
.mcard-head{display:flex;gap:12px;align-items:center;padding:10px;cursor:pointer}
.mcard-poster{width:48px;height:70px;border-radius:9px;flex-shrink:0;background:linear-gradient(135deg,var(--bg3),var(--bg));
  background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-size:20px}
.mcard-meta{flex:1;min-width:0}
.mcard-title{font-weight:700;font-size:15px;display:flex;align-items:center;gap:6px}
.mcard-sub{display:flex;align-items:center;gap:7px;margin-top:5px;flex-wrap:wrap}
.author-avatar{width:20px;height:20px;border-radius:50%;object-fit:cover;border:1px solid var(--line2)}
.mcard-cat{font-size:12px;color:var(--muted)}
.badge-seen{font-size:10px;color:var(--good);background:rgba(52,211,153,.12);padding:2px 7px;border-radius:99px}
.chip-today{font-size:10px;color:var(--gold);background:rgba(226,183,116,.14);padding:2px 7px;border-radius:99px;font-family:'Plus Jakarta Sans'}
.mcard-chev{color:var(--muted);transition:transform .3s;font-size:13px}
.mcard.open .mcard-chev{transform:rotate(180deg)}
.mcard-body{max-height:0;overflow:hidden;transition:max-height .4s ease;padding:0 12px}
.mcard.open .mcard-body{max-height:1600px;padding:0 12px 12px}
.mcard-desc{font-size:13px;color:#c8c8d2;line-height:1.5;margin:4px 0 10px}
.mcard-stars{display:flex;gap:4px;margin-bottom:10px}
.star{background:none;border:none;font-size:20px;color:#3a3a48;cursor:pointer;line-height:1}
.star.on{color:var(--gold)}
.mcard-actions{display:flex;gap:8px;margin-bottom:10px}
.act{flex:1;background:var(--bg3);border:1px solid var(--line2);color:var(--txt);padding:9px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer}
.act.del{flex:0 0 44px}
.act.watch{background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.3);color:var(--good)}
.reactions{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.react{background:var(--bg3);border:1px solid var(--line2);color:var(--txt);padding:6px 10px;border-radius:99px;font-size:13px;cursor:pointer}
.react.on{border-color:var(--accent);background:rgba(217,70,239,.12)}
.cmt-input{width:100%;background:var(--bg);border:1px solid var(--line2);color:var(--txt);padding:10px;border-radius:10px;font-size:13px;outline:none;font-family:inherit}
.cmt-input:focus{border-color:var(--gold)}
.cmt-list{margin-top:10px;display:flex;flex-direction:column;gap:10px}
.cmt-list:not(.open) .cmt-item:nth-child(n+2){display:none}
.cmt-item{display:flex;gap:8px}
.cmt-av{width:26px;height:26px;border-radius:50%;object-fit:cover;flex-shrink:0}
.cmt-d{font-size:11px;color:var(--muted)}
.cmt-t{font-size:13px;margin-top:2px}
.cmt-more{background:none;border:none;color:var(--gold);font-size:12px;font-weight:600;cursor:pointer;margin-top:8px;padding:0}

/* TOPS */
.tops-row{margin-top:22px}
.tops-title{font-size:16px;font-weight:700;margin:0 4px 12px}
.tops-scroll{display:flex;gap:14px;overflow-x:auto;padding:0 4px 10px;scroll-snap-type:x mandatory}
.tops-scroll::-webkit-scrollbar{display:none}
.tops-item{flex:0 0 auto;width:118px;position:relative;scroll-snap-align:start;cursor:pointer}
.tops-rank{position:absolute;left:-6px;bottom:24px;font-family:'Playfair Display',serif;font-weight:800;font-size:60px;
  line-height:1;color:transparent;-webkit-text-stroke:2px var(--gold);opacity:.85;z-index:1;text-shadow:0 4px 14px rgba(0,0,0,.6)}
.tops-poster{width:100%;height:172px;border-radius:12px;background:linear-gradient(135deg,var(--bg3),var(--bg));
  background-size:cover;background-position:center;position:relative;z-index:2;border:1px solid var(--line2);
  display:flex;align-items:center;justify-content:center;font-size:26px}
.tops-add{position:absolute;right:6px;top:6px;z-index:3;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.6);
  backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center}
.tops-name{font-size:12px;margin-top:6px;line-height:1.3;position:relative;z-index:2}
.tops-empty{color:var(--muted);font-size:13px;padding:20px}

/* TINDER */
#view-tinder{display:flex;flex-direction:column;align-items:center}
.swipe-deck{position:relative;width:100%;max-width:340px;height:62vh;max-height:560px;margin:6px auto 0}
.swipe-card{position:absolute;inset:0;border-radius:22px;overflow:hidden;background:var(--bg3);border:1px solid var(--line2);
  box-shadow:var(--sh);touch-action:none;will-change:transform;cursor:grab}
.swipe-poster{position:absolute;inset:0;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-size:60px}
.swipe-grad{position:absolute;inset:0;background:linear-gradient(180deg,transparent 38%,rgba(0,0,0,.55) 66%,rgba(0,0,0,.95))}
.swipe-badge{position:absolute;top:14px;left:14px;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);color:var(--gold);
  font-weight:700;font-size:13px;padding:5px 11px;border-radius:99px;border:1px solid rgba(226,183,116,.4)}
.swipe-info{position:absolute;left:0;right:0;bottom:0;padding:18px}
.swipe-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:800;line-height:1.1}
.swipe-sub{color:var(--gold);font-size:12px;margin:6px 0 8px;font-weight:600}
.swipe-desc{font-size:13px;color:#d8d8e0;line-height:1.45;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.swipe-ov{position:absolute;top:24px;font-size:26px;font-weight:800;padding:6px 14px;border-radius:10px;opacity:0;z-index:5;letter-spacing:1px}
.swipe-ov.like{right:18px;color:var(--good);border:3px solid var(--good);transform:rotate(14deg)}
.swipe-ov.nope{left:18px;color:var(--bad);border:3px solid var(--bad);transform:rotate(-14deg)}
.swipe-ov.up{left:50%;transform:translateX(-50%);top:50%;color:var(--gold);border:3px solid var(--gold)}
.swipe-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  text-align:center;color:var(--muted);font-size:34px;border:1px dashed var(--line2);border-radius:22px}
.swipe-empty small{font-size:15px;color:var(--txt);font-weight:700}
.swipe-empty span{font-size:12px}
.swipe-actions{display:flex;gap:18px;justify-content:center;margin-top:20px}
.swipe-act{width:60px;height:60px;border-radius:50%;border:1px solid var(--line2);background:var(--bg2);font-size:24px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;box-shadow:var(--sh);transition:transform .15s}
.swipe-act:active{transform:scale(.9)}
.swipe-act.nope{color:var(--bad)} .swipe-act.up{color:var(--gold)} .swipe-act.like{color:var(--good);width:66px;height:66px;font-size:28px}
.swipe-hint{color:var(--muted);font-size:12px;margin-top:14px;text-align:center}

/* BOTTOM NAV */
.bottom-nav{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:60;display:flex;gap:6px;
  background:rgba(20,20,31,.82);backdrop-filter:blur(16px);border:1px solid var(--line2);padding:6px;border-radius:99px;box-shadow:var(--sh)}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--muted);
  font-size:11px;font-weight:600;padding:8px 18px;border-radius:99px;cursor:pointer}
.nav-btn .nav-ico{font-size:18px}
.nav-btn.active{color:var(--gold);background:rgba(226,183,116,.12);box-shadow:inset 0 0 16px rgba(226,183,116,.18)}

/* TOAST */
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);z-index:200;background:#fff;color:#111;
  font-weight:700;font-size:13px;padding:11px 18px;border-radius:99px;opacity:0;pointer-events:none;transition:all .3s;box-shadow:var(--sh)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MODAL */
.modal{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:18px}
.modal.active{display:flex}
.modal-content{background:var(--bg2);border:1px solid var(--line2);border-radius:20px;padding:22px;width:100%;max-width:420px;position:relative;animation:floatIn .3s}
.close-modal{position:absolute;right:16px;top:12px;background:none;border:none;color:var(--muted);font-size:26px;cursor:pointer}
.modal h2{font-size:20px;margin-bottom:16px}
.profiles-list{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.profile-item{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border:1px solid var(--line2);padding:10px;border-radius:12px}
.profile-item.active-item{border-color:var(--gold)}
.profile-item-meta{display:flex;align-items:center;gap:10px}
.item-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover}
.item-name{font-weight:600}
.select-prof-btn{padding:7px 16px}
.profile-edit-form h3{font-size:15px;margin-bottom:12px;color:var(--muted)}
.edit-inputs{display:flex;gap:14px;align-items:center}
.avatar-upload-wrapper{display:flex;flex-direction:column;align-items:center;gap:6px}
.edit-preview-img{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)}
.avatar-upload-btn{font-size:11px;color:var(--gold);cursor:pointer}
#edit-nickname-input{flex:1;background:var(--bg);border:1px solid var(--line2);color:var(--txt);padding:12px;border-radius:12px;outline:none}

@media(max-width:380px){
  .hero h1{font-size:26px}.swipe-act{width:54px;height:54px;font-size:22px}.nav-btn{padding:8px 14px}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="profile-chip" id="openProfileModal">
    <img id="activeProfileAvatar" class="chip-avatar" src="">
    <span id="activeProfileName">Загрузка…</span>
  </div>
  <div class="topbar-right">
    <button class="bell-btn" id="notifBell">🔔<span class="notif-badge" id="notifBadge"></span></button>
    <div class="notif-dropdown" id="notifDropdown">
      <div class="notif-head"><span>Уведомления</span><button id="markAllReadBtn">Прочитать всё</button></div>
      <div id="notifList"></div>
    </div>
  </div>
</header>

<main class="container">

  <!-- ЛЕНТА -->
  <section id="view-feed" class="view">
    <div class="hero">
      <h1>Яна и Юра</h1>
      <p class="subtitle">ваш личный кинозал</p>
    </div>
    <div class="theme-row">
      <button class="theme-btn" id="themePink">🍇 Plum</button>
      <button class="theme-btn" id="themeNetflix">🍿 Dark</button>
    </div>
    <div class="stats">
      <div class="stat-card"><div class="stat-label">Всего</div><div class="stat-num" id="totalCount">0</div></div>
      <div class="stat-card"><div class="stat-label">Посмотрели</div><div class="stat-num" id="watchedCount">0</div></div>
    </div>
    <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">Просмотрено 0%</div>

    <div class="add-box">
      <input id="titleInput" placeholder="🔎 Найти фильм по названию…" autocomplete="off">
      <div id="searchResults" class="search-results"></div>
      <textarea id="descInput" placeholder="Описание (заполнится автоматически)"></textarea>
      <select id="categoryInput">
        <option>😂 Комедии</option>
        <option>❤️ Романтическое</option>
        <option>💀 Ужасы</option>
        <option>🍿 Под чипсы</option>
      </select>
      <div class="add-actions">
        <button class="main-btn" id="addBtn">Добавить</button>
        <button class="ghost-btn" id="randomBtn">🎲 Случайно</button>
      </div>
      <div class="random-result" id="randomResult"></div>
    </div>

    <div id="categories"></div>

    <button class="section-toggle" id="toggleWatched">
      <span>✅ Уже посмотрели <span id="watchedToggleCount">(0)</span></span><span class="arr">▾</span>
    </button>
    <div id="watchedGrid" class="movie-grid hidden"></div>
  </section>

  <!-- ТОПЫ -->
  <section id="view-tops" class="view" style="display:none">
    <div class="hero"><h1>Топы сейчас</h1><p class="subtitle">что смотрят по категориям</p></div>
    <div id="topsContainer"></div>
  </section>

  <!-- ТИНДЕР -->
  <section id="view-tinder" class="view" style="display:none">
    <div class="hero"><h1>Свайп фильмов</h1><p class="subtitle">новинки — добавляйте в список</p></div>
    <div class="swipe-deck" id="swipeDeck"></div>
    <div class="swipe-actions">
      <button class="swipe-act nope" id="btnNope">✕</button>
      <button class="swipe-act up" id="btnUp">🍿</button>
      <button class="swipe-act like" id="btnLike">＋</button>
    </div>
    <div class="swipe-hint">← мимо&nbsp;·&nbsp;＋ в список&nbsp;·&nbsp;🍿 на сегодня (свайп вверх)</div>
  </section>

</main>

<nav class="bottom-nav">
  <button class="nav-btn active" data-view="feed"><span class="nav-ico">🎬</span><span>Лента</span></button>
  <button class="nav-btn" data-view="tops"><span class="nav-ico">🔥</span><span>Топы</span></button>
  <button class="nav-btn" data-view="tinder"><span class="nav-ico">🃏</span><span>Тиндер</span></button>
</nav>

<div id="toast" class="toast"></div>

<div class="modal" id="profileModal">
  <div class="modal-content">
    <button class="close-modal" id="closeProfileModal">&times;</button>
    <h2>Кто сейчас у экрана?</h2>
    <div class="profiles-list">
      <div class="profile-item" id="prof-yana">
        <div class="profile-item-meta">
          <img class="item-avatar" id="modal-yana-avatar" src="">
          <span class="item-name" id="modal-yana-name">Яна</span>
        </div>
        <button class="theme-btn select-prof-btn" data-id="yana">Войти</button>
      </div>
      <div class="profile-item" id="prof-yura">
        <div class="profile-item-meta">
          <img class="item-avatar" id="modal-yura-avatar" src="">
          <span class="item-name" id="modal-yura-name">Юра</span>
        </div>
        <button class="theme-btn select-prof-btn" data-id="yura">Войти</button>
      </div>
    </div>
    <div class="profile-edit-form">
      <h3>Редактировать профиль</h3>
      <div class="edit-inputs">
        <div class="avatar-upload-wrapper">
          <img class="edit-preview-img" id="edit-avatar-preview" src="">
          <label for="avatarFileInput" class="avatar-upload-btn">Сменить фото</label>
          <input type="file" id="avatarFileInput" accept="image/*" style="display:none">
        </div>
        <input type="text" id="edit-nickname-input" placeholder="Ваше имя">
      </div>
      <button class="main-btn" id="saveProfileBtn" style="width:100%;margin-top:18px">Сохранить</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, setDoc, getDocs, onSnapshot, query, orderBy }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAjnuLCinerxH_q0IV28V_4GChZfB-g1Bg",
  authDomain: "movie-watchlist-7883c.firebaseapp.com",
  projectId: "movie-watchlist-7883c",
  storageBucket: "movie-watchlist-7883c.firebasestorage.app",
  messagingSenderId: "585421393583",
  appId: "1:585421393583:web:b3c62cb16d99d8e3a18e5a"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const moviesRef = collection(db,"movies");
const commentsRef = collection(db,"comments");
const reactionsRef = collection(db,"reactions");
const profilesRef = collection(db,"profiles");
const notificationsRef = collection(db,"notifications");

// TMDB (хост собран из кусочков, чтобы ссылка не «ломалась» при копировании)
const TMDB_KEY = "35a7c9cb588541cf79e297fbeb46e131";
function tmdb(path){
  const sep = path.indexOf("?") > -1 ? "&" : "?";
  const url = "https://" + "api.themoviedb.org/3" + path + sep + "api_key=" + TMDB_KEY + "&language=ru-RU";
  return fetch(url).then(r => r.json());
}
function poster(p){ return p ? ("https://" + "image.tmdb.org/t/p/w500" + p) : ""; }
function esc(s){ return (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function mapGenre(ids){ ids=ids||[];
  if(ids.includes(35)) return "😂 Комедии";
  if(ids.includes(10749)) return "❤️ Романтическое";
  if(ids.includes(27)) return "💀 Ужасы";
  return "🍿 Под чипсы"; }

const categoryMap = {};
let allMovies = [];
let selectedPoster = "", selTmdb = null;
let activeProfileId = localStorage.getItem("activeProfileId") || "yana";
let profilesData = { yana:{name:"Яна",avatar:""}, yura:{name:"Юра",avatar:""} };

function getAvatarUrl(name, avatar){
  if(avatar && avatar.trim() !== "") return avatar;
  const i = name ? name.charAt(0).toUpperCase() : "?";
  return `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><rect width="100%" height="100%" fill="%23141420"/><text x="50%" y="56%" font-family="sans-serif" font-size="46" font-weight="700" fill="%23e2b774" dominant-baseline="middle" text-anchor="middle">${i}</text></svg>`;
}
function resolveAuthor(m){
  if(m.authorId && profilesData[m.authorId]) return profilesData[m.authorId];
  if(m.author){ const f=Object.values(profilesData).find(p=>p.name===m.author); if(f) return f; return {name:m.author,avatar:m.authorAvatar||""}; }
  return {name:"кто-то",avatar:""};
}

let toastTimer;
function showToast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),1600); }
function burst(x,y,emoji){
  for(let i=0;i<12;i++){ const s=document.createElement("div"); s.textContent=emoji;
    s.style.cssText=`position:fixed;left:${x}px;top:${y}px;font-size:${12+Math.random()*16}px;pointer-events:none;z-index:400;transition:transform 1s ease-out,opacity 1s ease-out`;
    document.body.appendChild(s);
    requestAnimationFrame(()=>{ const a=Math.random()*6.28,d=60+Math.random()*130; s.style.transform=`translate(${Math.cos(a)*d}px,${Math.sin(a)*d+70}px) rotate(${Math.random()*360}deg)`; s.style.opacity="0"; });
    setTimeout(()=>s.remove(),1100); }
}

/* ---- ПРОФИЛИ ---- */
const modal = document.getElementById("profileModal");
function updateProfileUI(){
  const ap = profilesData[activeProfileId] || {name:"",avatar:""};
  document.getElementById("activeProfileName").textContent = ap.name;
  document.getElementById("activeProfileAvatar").src = getAvatarUrl(ap.name,ap.avatar);
  document.getElementById("edit-nickname-input").value = ap.name;
  document.getElementById("edit-avatar-preview").src = getAvatarUrl(ap.name,ap.avatar);
  ["yana","yura"].forEach(id=>{ const p=profilesData[id]; const av=document.getElementById(`modal-${id}-avatar`), nm=document.getElementById(`modal-${id}-name`), ct=document.getElementById(`prof-${id}`);
    if(p&&av){ av.src=getAvatarUrl(p.name,p.avatar); nm.textContent=p.name; ct.classList.toggle("active-item",activeProfileId===id); } });
}
onSnapshot(profilesRef,snap=>{
  if(snap.empty){ setDoc(doc(db,"profiles","yana"),{name:"Яна",avatar:""}); setDoc(doc(db,"profiles","yura"),{name:"Юра",avatar:""}); return; }
  snap.forEach(d=>profilesData[d.id]=d.data()); updateProfileUI();
});
document.getElementById("openProfileModal").onclick=()=>modal.classList.add("active");
document.getElementById("closeProfileModal").onclick=()=>modal.classList.remove("active");
window.addEventListener("click",e=>{ if(e.target===modal) modal.classList.remove("active"); });
document.querySelectorAll(".select-prof-btn").forEach(b=>b.onclick=()=>{ activeProfileId=b.dataset.id; localStorage.setItem("activeProfileId",activeProfileId); updateProfileUI(); modal.classList.remove("active"); });
document.getElementById("avatarFileInput").onchange=e=>{ const f=e.target.files[0]; if(!f) return; const rd=new FileReader();
  rd.onload=ev=>{ const img=new Image(); img.onload=()=>{ const c=document.createElement("canvas"),x=c.getContext("2d"); c.width=c.height=120;
    const s=Math.min(img.width,img.height),ox=(img.width-s)/2,oy=(img.height-s)/2; x.drawImage(img,ox,oy,s,s,0,0,120,120);
    document.getElementById("edit-avatar-preview").src=c.toDataURL("image/jpeg",.85); }; img.src=ev.target.result; }; rd.readAsDataURL(f); };
document.getElementById("saveProfileBtn").onclick=async()=>{ const n=document.getElementById("edit-nickname-input").value.trim(); if(!n) return;
  const av=document.getElementById("edit-avatar-preview").src; const def=av.startsWith("data:image/svg+xml");
  await setDoc(doc(db,"profiles",activeProfileId),{name:n,avatar:def?"":av}); modal.classList.remove("active"); };

/* ---- ТЕМЫ ---- */
if(localStorage.getItem("theme")==="netflix") document.body.classList.add("netflix-theme");
document.getElementById("themeNetflix").onclick=()=>{ document.body.classList.add("netflix-theme"); localStorage.setItem("theme","netflix"); };
document.getElementById("themePink").onclick=()=>{ document.body.classList.remove("netflix-theme"); localStorage.setItem("theme","pink"); };

/* ---- УВЕДОМЛЕНИЯ ---- */
onSnapshot(query(notificationsRef,orderBy("createdAt","desc")),snap=>{
  const list=document.getElementById("notifList"), badge=document.getElementById("notifBadge");
  list.innerHTML=""; let unread=0,has=false;
  snap.forEach(d=>{ const n=d.data(),nid=d.id; if(n.toUserId!==activeProfileId) return; has=true; if(!n.read) unread++;
    const date=new Date(n.createdAt).toLocaleDateString("ru-RU",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
    const el=document.createElement("div"); el.className=`notif-item ${n.read?"":"unread"}`;
    el.innerHTML=`<img src="${getAvatarUrl(n.fromUserName,n.fromUserAvatar)}" class="notif-avatar"><div><div><b class="notif-sender">${esc(n.fromUserName)}</b> ${esc(n.text)}</div><div class="notif-time">${date}</div></div>`;
    el.onclick=async()=>{ await updateDoc(doc(db,"notifications",nid),{read:true});
      if(n.movieId){ switchView("feed"); const me=document.getElementById(`movie-${n.movieId}`); if(me){ me.classList.add("open"); me.scrollIntoView({behavior:"smooth",block:"center"}); } }
      document.getElementById("notifDropdown").classList.remove("active"); };
    list.appendChild(el); });
  if(!has) list.innerHTML=`<div class="notif-empty">Нет уведомлений 🍿</div>`;
  badge.textContent=unread; badge.style.display=unread>0?"flex":"none";
});
const bell=document.getElementById("notifBell"), drop=document.getElementById("notifDropdown");
bell.onclick=e=>{ e.stopPropagation(); drop.classList.toggle("active"); };
document.addEventListener("click",e=>{ if(!drop.contains(e.target)&&e.target!==bell) drop.classList.remove("active"); });
document.getElementById("markAllReadBtn").onclick=async()=>{ const qs=await getDocs(query(notificationsRef));
  qs.forEach(async d=>{ const x=d.data(); if(x.toUserId===activeProfileId&&!x.read) await updateDoc(doc(db,"notifications",d.id),{read:true}); }); };

/* ---- НАВИГАЦИЯ ---- */
function switchView(name){
  if(name==="profile"){ modal.classList.add("active"); return; }
  ["feed","tops","tinder"].forEach(v=>document.getElementById("view-"+v).style.display=(v===name)?"block":"none");
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.toggle("active",b.dataset.view===name));
  if(name==="tops") loadTops();
  if(name==="tinder") ensureTinder();
  window.scrollTo({top:0,behavior:"smooth"});
}
document.querySelectorAll(".nav-btn").forEach(b=>b.onclick=()=>switchView(b.dataset.view));
document.getElementById("toggleWatched").onclick=function(){ document.getElementById("watchedGrid").classList.toggle("hidden"); this.classList.toggle("open"); };

/* ---- КАРТОЧКИ ФИЛЬМОВ (ЛЕНТА) ---- */
function createCategory(title){
  if(categoryMap[title]) return categoryMap[title];
  const sec=document.createElement("div");
  sec.innerHTML=`<div class="cat-title">${esc(title)}</div><div class="movie-grid"></div>`;
  document.getElementById("categories").appendChild(sec);
  categoryMap[title]=sec.querySelector(".movie-grid");
  return categoryMap[title];
}

function createMovieCard(movie){
  const id=movie.id;
  const card=document.createElement("div");
  card.className="mcard"; card.id=`movie-${id}`;
  const a=resolveAuthor(movie);
  const tonight=(movie.tonight&&!movie.watched)?`<span class="chip-today">сегодня</span>`:"";
  const stars=movie.watched?`<div class="mcard-stars">${[1,2,3,4,5].map(n=>`<button class="star ${(movie.rating||0)>=n?'on':''}" data-s="${n}">★</button>`).join("")}</div>`:"";
  card.innerHTML=`
    <div class="mcard-head">
      <div class="mcard-poster" style="${movie.poster?`background-image:url('${movie.poster}')`:''}">${movie.poster?'':'🎬'}</div>
      <div class="mcard-meta">
        <div class="mcard-title">${esc(movie.title)} ${tonight}</div>
        <div class="mcard-sub">
          <img class="author-avatar" src="${getAvatarUrl(a.name,a.avatar)}" title="${esc(a.name)}">
          <span class="mcard-cat">${esc(movie.category||'')}</span>
          ${movie.watched?'<span class="badge-seen">✓ просмотрено</span>':''}
        </div>
      </div>
      <div class="mcard-chev">▾</div>
    </div>
    <div class="mcard-body">
      <div class="mcard-desc">${esc(movie.desc||'Описание скоро появится 🍿')}</div>
      ${stars}
      <div class="mcard-actions">
        <button class="act watch">${movie.watched?'↩ Вернуть в план':'✓ Посмотрели'}</button>
        <button class="act del">🗑</button>
      </div>
      <div class="reactions">
        <button class="react" data-e="❤️">❤️ <span>0</span></button>
        <button class="react" data-e="😭">😭 <span>0</span></button>
        <button class="react" data-e="🔥">🔥 <span>0</span></button>
        <button class="react" data-e="🔞">🔞 <span>0</span></button>
      </div>
      <input class="cmt-input" placeholder="Комментарий…">
      <div class="cmt-list"></div>
      <button class="cmt-more" style="display:none"></button>
    </div>`;

  const head=card.querySelector(".mcard-head");
  head.onclick=e=>{ if(e.target.closest(".star")) return; card.classList.toggle("open"); };

  card.querySelector(".watch").onclick=async e=>{ e.stopPropagation(); await updateDoc(doc(db,"movies",id),{watched:!movie.watched,watchedAt:Date.now(),tonight:false}); };
  card.querySelector(".del").onclick=async e=>{ e.stopPropagation(); await deleteDoc(doc(db,"movies",id)); };
  card.querySelectorAll(".star").forEach(b=>b.onclick=async e=>{ e.stopPropagation(); await updateDoc(doc(db,"movies",id),{rating:Number(b.dataset.s)}); showToast(`★ ${b.dataset.s}/5`); });

  const reactBtns=card.querySelectorAll(".react");
  reactBtns.forEach(b=>b.onclick=async e=>{ e.stopPropagation(); await addDoc(reactionsRef,{movieId:id,emoji:b.dataset.e,createdAt:Date.now()}); });
  onSnapshot(reactionsRef,snap=>{ const c={}; snap.forEach(d=>{const r=d.data(); if(r.movieId===id) c[r.emoji]=(c[r.emoji]||0)+1;});
    reactBtns.forEach(b=>{ const n=c[b.dataset.e]||0; b.querySelector("span").textContent=n; b.classList.toggle("on",n>0); }); });

  const cmtInput=card.querySelector(".cmt-input"), cmtList=card.querySelector(".cmt-list"), cmtMore=card.querySelector(".cmt-more");
  cmtInput.onclick=e=>e.stopPropagation();
  cmtInput.addEventListener("keypress",async e=>{ if(e.key!=="Enter"||!cmtInput.value.trim()) return;
    const ap=profilesData[activeProfileId]||{name:"",avatar:""};
    await addDoc(commentsRef,{movieId:id,text:cmtInput.value.trim(),createdAt:Date.now(),authorId:activeProfileId,authorName:ap.name,authorAvatar:ap.avatar||""});
    const t=activeProfileId==="yana"?"yura":"yana";
    await addDoc(notificationsRef,{toUserId:t,fromUserId:activeProfileId,fromUserName:ap.name,fromUserAvatar:ap.avatar||"",type:"comment",text:`написал(а) комментарий к «${movie.title}»`,movieId:id,createdAt:Date.now(),read:false});
    cmtInput.value=""; });
  cmtMore.onclick=e=>{ e.stopPropagation(); cmtList.classList.toggle("open"); const n=cmtList.querySelectorAll(".cmt-item").length-1; cmtMore.textContent=cmtList.classList.contains("open")?"Скрыть":`Показать ещё ${n}`; };
  onSnapshot(query(commentsRef,orderBy("createdAt")),snap=>{ cmtList.innerHTML=""; const arr=[];
    snap.forEach(d=>{ const c=d.data(); if(c.movieId===id) arr.push(c); });
    arr.forEach(c=>{ const el=document.createElement("div"); el.className="cmt-item";
      const d=new Date(c.createdAt).toLocaleDateString("ru-RU",{day:"numeric",month:"short"});
      el.innerHTML=`<img class="cmt-av" src="${getAvatarUrl(c.authorName,c.authorAvatar)}"><div><b>${esc(c.authorName||'Аноним')}</b> <span class="cmt-d">${d}</span><div class="cmt-t">${esc(c.text)}</div></div>`;
      cmtList.appendChild(el); });
    if(arr.length>1){ cmtMore.style.display="block"; cmtMore.textContent=cmtList.classList.contains("open")?"Скрыть":`Показать ещё ${arr.length-1}`; }
    else cmtMore.style.display="none"; });

  if(movie.watched) document.getElementById("watchedGrid").appendChild(card);
  else createCategory(movie.category||"🍿 Под чипсы").appendChild(card);
}

/* ---- СПИСОК ФИЛЬМОВ ---- */
let existingKeys=new Set();
function refreshExistingKeys(){ existingKeys=new Set(); allMovies.forEach(m=>{ if(m.tmdbId) existingKeys.add("id:"+m.tmdbId); if(m.title) existingKeys.add("t:"+m.title.trim().toLowerCase()); }); }

onSnapshot(moviesRef,snap=>{
  document.getElementById("categories").innerHTML="";
  document.getElementById("watchedGrid").innerHTML="";
  Object.keys(categoryMap).forEach(k=>delete categoryMap[k]);
  allMovies=[]; let watched=0;
  snap.forEach(d=>{ const m={id:d.id,...d.data()}; allMovies.push(m); if(m.watched) watched++; createMovieCard(m); });
  document.getElementById("totalCount").textContent=allMovies.length;
  document.getElementById("watchedCount").textContent=watched;
  const pct=allMovies.length?Math.round(watched/allMovies.length*100):0;
  document.getElementById("progressFill").style.width=pct+"%";
  document.getElementById("progressText").textContent=`Просмотрено ${pct}%`;
  document.getElementById("watchedToggleCount").textContent=`(${watched})`;
  refreshExistingKeys();
});

/* ---- ПОИСК + ДОБАВЛЕНИЕ ---- */
const titleInput=document.getElementById("titleInput"), descInput=document.getElementById("descInput");
let searchTimer;
titleInput.addEventListener("input",()=>{ clearTimeout(searchTimer); const q=titleInput.value.trim(); const sr=document.getElementById("searchResults");
  if(q.length<2){ sr.innerHTML=""; return; }
  searchTimer=setTimeout(async()=>{ try{ const data=await tmdb("/search/movie?query="+encodeURIComponent(q)); sr.innerHTML="";
    (data.results||[]).slice(0,6).forEach(m=>{ const div=document.createElement("div"); div.className="search-item"; const p=poster(m.poster_path);
      div.innerHTML=`<img src="${p}"><div><div style="font-weight:600">${esc(m.title)}</div><div class="si-y">${(m.release_date||"").slice(0,4)}</div></div>`;
      div.onclick=()=>{ titleInput.value=m.title; descInput.value=m.overview||""; selectedPoster=p; selTmdb=m; sr.innerHTML=""; document.getElementById("categoryInput").value=mapGenre(m.genre_ids); };
      sr.appendChild(div); }); }catch(e){} },350); });

document.getElementById("addBtn").onclick=async()=>{
  const title=titleInput.value.trim(); if(!title) return;
  const ap=profilesData[activeProfileId]||{name:"",avatar:""};
  const mv=await addDoc(moviesRef,{title,desc:descInput.value.trim(),category:document.getElementById("categoryInput").value,
    author:ap.name,authorId:activeProfileId,authorAvatar:ap.avatar||"",poster:selectedPoster,tmdbId:selTmdb?selTmdb.id:null,
    watched:false,favorite:false,tonight:false,createdAt:Date.now()});
  const t=activeProfileId==="yana"?"yura":"yana";
  await addDoc(notificationsRef,{toUserId:t,fromUserId:activeProfileId,fromUserName:ap.name,fromUserAvatar:ap.avatar||"",type:"add_movie",text:`добавил(а) фильм «${title}»`,movieId:mv.id,createdAt:Date.now(),read:false});
  titleInput.value=""; descInput.value=""; selectedPoster=""; selTmdb=null; showToast("🎬 Фильм добавлен");
};

document.getElementById("randomBtn").onclick=()=>{ const pool=allMovies.filter(m=>!m.watched); const r=document.getElementById("randomResult");
  if(!pool.length){ r.textContent="🍿 Список пуст — добавьте фильмы"; return; }
  const p=pool[Math.floor(Math.random()*pool.length)]; r.innerHTML=`Сегодня смотрите:<br><b style="font-family:'Playfair Display',serif;font-size:22px;color:var(--gold)">${esc(p.title)}</b>`; };

/* ---- ТОПЫ ---- */
const TOPS=[
  {t:"🔥 В тренде",p:"/trending/movie/week"},
  {t:"😂 Комедии",p:"/discover/movie?with_genres=35&sort_by=popularity.desc"},
  {t:"❤️ Романтика",p:"/discover/movie?with_genres=10749&sort_by=popularity.desc"},
  {t:"💀 Ужасы",p:"/discover/movie?with_genres=27&sort_by=popularity.desc"},
  {t:"🎬 Популярное",p:"/movie/popular"}
];
let topsLoaded=false;
async function loadTops(){ if(topsLoaded) return; topsLoaded=true; const cont=document.getElementById("topsContainer"); cont.innerHTML="";
  for(const row of TOPS){ const sec=document.createElement("div"); sec.className="tops-row"; sec.innerHTML=`<div class="tops-title">${row.t}</div><div class="tops-scroll"></div>`; cont.appendChild(sec);
    const sc=sec.querySelector(".tops-scroll");
    try{ const data=await tmdb(row.p); (data.results||[]).slice(0,12).forEach((m,i)=>{ const p=poster(m.poster_path); const it=document.createElement("div"); it.className="tops-item";
      it.innerHTML=`<div class="tops-rank">${i+1}</div><div class="tops-poster" style="${p?`background-image:url('${p}')`:''}">${p?'':'🎬'}</div><div class="tops-add">＋</div><div class="tops-name">${esc(m.title)}</div>`;
      it.querySelector(".tops-add").onclick=e=>{ e.stopPropagation(); addFromTmdb(m); }; it.onclick=()=>addFromTmdb(m); sc.appendChild(it); });
    }catch(e){ sc.innerHTML='<div class="tops-empty">Не загрузилось</div>'; } } }
async function addFromTmdb(m){ refreshExistingKeys(); if(existingKeys.has("id:"+m.id)){ showToast("Уже в списке"); return; }
  const ap=profilesData[activeProfileId]||{name:"",avatar:""};
  await addDoc(moviesRef,{title:m.title||m.name||"",desc:m.overview||"",category:mapGenre(m.genre_ids),author:ap.name,authorId:activeProfileId,authorAvatar:ap.avatar||"",poster:poster(m.poster_path),tmdbId:m.id,watched:false,favorite:false,tonight:false,createdAt:Date.now()});
  showToast("＋ Добавлено в список"); }

/* ---- ТИНДЕР (новые фильмы из TMDB) ---- */
const deckEl=document.getElementById("swipeDeck");
let tinderQueue=[], tinderLoaded=false, tinderSwiped=new Set(), deckMovies=[], deckAnimating=false;
async function loadTinderPool(){ const seen=new Set(), pool=[];
  for(const p of ["/trending/movie/week","/movie/popular?page=1","/movie/popular?page=2","/trending/movie/week?page=2","/movie/top_rated"]){
    try{ const data=await tmdb(p); (data.results||[]).forEach(m=>{ if(!seen.has(m.id)){ seen.add(m.id); pool.push(m); } }); }catch(e){} }
  for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  tinderQueue=pool; tinderLoaded=true; }
function nextTinder(){ refreshExistingKeys();
  while(tinderQueue.length){ const m=tinderQueue.shift(); if(existingKeys.has("id:"+m.id)) continue; if(tinderSwiped.has(m.id)) continue; if(!m.poster_path) continue; return m; }
  return null; }
async function ensureTinder(){ if(!tinderLoaded){ deckEl.innerHTML='<div class="swipe-empty">⏳<small>Подбираем фильмы…</small></div>'; await loadTinderPool(); } if(deckMovies.length===0) fillDeck(); else renderDeck(); }
function fillDeck(){ while(deckMovies.length<2){ const m=nextTinder(); if(!m) break; deckMovies.push(m); } renderDeck(); }
function buildTinderCard(m){ const card=document.createElement("div"); card.className="swipe-card"; const p=poster(m.poster_path);
  const year=(m.release_date||"").slice(0,4), rate=m.vote_average?m.vote_average.toFixed(1):"—", cat=mapGenre(m.genre_ids);
  card.innerHTML=`<div class="swipe-poster" style="${p?`background-image:url('${p}')`:''}">${p?'':'🎬'}</div><div class="swipe-grad"></div>
    <div class="swipe-badge">★ ${rate}</div>
    <div class="swipe-ov like">В СПИСОК</div><div class="swipe-ov nope">МИМО</div><div class="swipe-ov up">СЕГОДНЯ</div>
    <div class="swipe-info"><div class="swipe-title">${esc(m.title||m.name||'')}</div><div class="swipe-sub">${year}${cat?' · '+cat:''}</div><div class="swipe-desc">${esc(m.overview||'Описание недоступно')}</div></div>`;
  return card; }
function renderDeck(){ deckEl.innerHTML="";
  if(deckMovies.length===0){ deckEl.innerHTML='<div class="swipe-empty">🎬<small>Пока всё пересмотрели</small><span>Загляните позже за новинками</span></div>'; updateSwipeButtons(false); return; }
  const show=deckMovies.slice(0,2);
  for(let i=show.length-1;i>=0;i--){ const m=show[i]; const card=buildTinderCard(m); card.style.zIndex=String(10-i); card.style.transform=`scale(${1-i*0.05}) translateY(${i*14}px)`;
    if(i===0) attachSwipe(card,m); deckEl.appendChild(card); }
  updateSwipeButtons(true); }
function topCard(){ return deckEl.querySelector(".swipe-card:last-child"); }
function attachSwipe(card,m){ let sx=0,sy=0,dx=0,dy=0,drag=false;
  const like=card.querySelector(".like"),nope=card.querySelector(".nope"),up=card.querySelector(".up");
  card.addEventListener("pointerdown",e=>{ drag=true; sx=e.clientX; sy=e.clientY; card.style.transition="none"; card.setPointerCapture(e.pointerId); });
  card.addEventListener("pointermove",e=>{ if(!drag) return; dx=e.clientX-sx; dy=e.clientY-sy;
    card.style.transform=`translate(${dx}px,${dy}px) rotate(${dx/22}deg)`;
    like.style.opacity=Math.max(0,Math.min(1,dx/120)); nope.style.opacity=Math.max(0,Math.min(1,-dx/120)); up.style.opacity=Math.max(0,Math.min(1,(-dy-40)/110)); });
  function end(){ if(!drag) return; drag=false; card.style.transition="transform .4s cubic-bezier(.16,1,.3,1),opacity .4s"; const TH=100;
    if(dy<-TH&&Math.abs(dx)<80) doFly("up"); else if(dx>TH) doFly("right"); else if(dx<-TH) doFly("left");
    else { card.style.transform=""; like.style.opacity=nope.style.opacity=up.style.opacity=0; } }
  card.addEventListener("pointerup",end); card.addEventListener("pointercancel",end); }
function doFly(dir){ if(deckAnimating||deckMovies.length===0) return; deckAnimating=true;
  const m=deckMovies[0], card=topCard(), rect=card.getBoundingClientRect();
  card.style.transition="transform .4s cubic-bezier(.16,1,.3,1),opacity .4s";
  if(dir==="right") card.style.transform="translate(160%,30px) rotate(22deg)"; else if(dir==="left") card.style.transform="translate(-160%,30px) rotate(-22deg)"; else card.style.transform="translate(0,-160%)";
  card.style.opacity="0"; tinderSwiped.add(m.id); deckMovies.shift(); handleTinder(m,dir,rect);
  setTimeout(()=>{ deckAnimating=false; fillDeck(); },380); }
async function handleTinder(m,dir,rect){ if(dir==="left"){ showToast("👎 Пропущено"); return; }
  const ap=profilesData[activeProfileId]||{name:"",avatar:""};
  await addDoc(moviesRef,{title:m.title||m.name||"",desc:m.overview||"",category:mapGenre(m.genre_ids),author:ap.name,authorId:activeProfileId,authorAvatar:ap.avatar||"",poster:poster(m.poster_path),tmdbId:m.id,watched:false,favorite:false,tonight:dir==="up",createdAt:Date.now()});
  const t=activeProfileId==="yana"?"yura":"yana";
  await addDoc(notificationsRef,{toUserId:t,fromUserId:activeProfileId,fromUserName:ap.name,fromUserAvatar:ap.avatar||"",type:"add_movie",text:`добавил(а) фильм «${m.title||m.name}»`,movieId:"",createdAt:Date.now(),read:false});
  if(dir==="up"){ showToast("🍿 Смотрим сегодня!"); if(rect) burst(rect.left+rect.width/2,rect.top+60,"🍿"); }
  else { showToast("＋ Добавлено в список"); if(rect) burst(rect.left+rect.width*0.8,rect.top+60,"❤️"); } }
function updateSwipeButtons(on){ ["btnNope","btnUp","btnLike"].forEach(id=>{ const b=document.getElementById(id); if(b){ b.disabled=!on; b.style.opacity=on?"1":".35"; } }); }
document.getElementById("btnNope").onclick=()=>doFly("left");
document.getElementById("btnUp").onclick=()=>doFly("up");
document.getElementById("btnLike").onclick=()=>doFly("right");

/* ---- СТАРТ ---- */
updateProfileUI();
switchView("feed");
</script>
