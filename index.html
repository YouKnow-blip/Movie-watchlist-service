<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Мы Смотрим</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root {
  --bg: #F6EFC8;
  --pink: #FFABE1;
  --light-pink: #FFE6E6;
  --purple: #A685E2;
  --deep: #6155A6;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: var(--bg);
  font-family: Inter, sans-serif;
  color: var(--deep);
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 1200px;
  margin: auto;
}

.hero {
  text-align: center;
  margin-bottom: 40px;
}

.hero h1 {
  font-family: Pacifico, cursive;
  font-size: 62px;
  color: var(--deep);
}

.hero p {
  margin-top: 10px;
  font-size: 18px;
}

.search-box {
  margin-bottom: 30px;
  position: relative;
}

#movieSearch {
  width: 100%;
  padding: 20px;
  border-radius: 24px;
  border: none;
  outline: none;
  font-size: 18px;
  background: rgba(255,255,255,0.7);
}

#searchResults {
  margin-top: 15px;
  display: grid;
  gap: 12px;
}

.search-item {
  background: rgba(255,255,255,0.7);
  border-radius: 24px;
  padding: 14px;
  display: flex;
  gap: 15px;
  align-items: center;
  cursor: pointer;
  transition: 0.2s;
}

.search-item:hover {
  transform: scale(1.02);
}

.search-item img {
  width: 70px;
  height: 100px;
  object-fit: cover;
  border-radius: 16px;
}

.random-box {
  text-align: center;
  margin-bottom: 40px;
}

#randomBtn {
  background: linear-gradient(135deg,var(--pink),var(--purple));
  color: white;
  border: none;
  padding: 18px 28px;
  border-radius: 999px;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
}

#randomResult {
  margin-top: 20px;
  font-size: 24px;
  font-weight: 700;
}

.section-title {
  font-size: 30px;
  margin-bottom: 20px;
  font-weight: 700;
}

.movie-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
  gap: 20px;
  margin-bottom: 50px;
}

.movie-card {
  background: rgba(255,255,255,0.6);
  border-radius: 30px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.movie-card img {
  width: 100%;
  height: 360px;
  object-fit: cover;
}

.movie-content {
  padding: 20px;
}

.movie-title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 10px;
}

.movie-desc {
  font-size: 14px;
  line-height: 1.5;
  opacity: 0.8;
  margin-bottom: 16px;
}

.movie-buttons {
  display: flex;
  gap: 10px;
}

.movie-buttons button {
  flex: 1;
  border: none;
  padding: 14px;
  border-radius: 16px;
  font-weight: 700;
  cursor: pointer;
}

.watch-btn {
  background: var(--purple);
  color: white;
}

.delete-btn {
  background: var(--pink);
  color: white;
}

.comments {
  margin-top: 15px;
}

.comment-input {
  width: 100%;
  border: none;
  border-radius: 14px;
  padding: 12px;
  margin-bottom: 10px;
}

.comment {
  background: rgba(255,255,255,0.6);
  border-radius: 12px;
  padding: 10px;
  margin-top: 8px;
  font-size: 14px;
}

@media(max-width:768px){

.hero h1{
  font-size:48px;
}

.movie-card img{
  height:300px;
}

}

</style>
</head>

<body>

<div class="container">

<header class="hero">
<h1>Мы Смотрим</h1>
<p>Яна ❤️ Юра</p>
</header>

<section class="search-box">

<input
type="text"
id="movieSearch"
placeholder="Найти фильм или сериал..."
>

<div id="searchResults"></div>

</section>

<section class="random-box">

<button id="randomBtn">
🎲 Выбрать вечер
</button>

<div id="randomResult"></div>

</section>

<section>

<div class="section-title">
🍿 К просмотру
</div>

<div id="movieGrid" class="movie-grid"></div>

</section>

<section>

<div class="section-title">
✅ Уже посмотрели
</div>

<div id="watchedGrid" class="movie-grid"></div>

</section>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
deleteDoc,
doc,
updateDoc,
onSnapshot,
query,
orderBy
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAjnuLCinerxH_q0IV28V_4GChZfB-g1Bg",
authDomain: "movie-watchlist-7883c.firebaseapp.com",
projectId: "movie-watchlist-7883c",
storageBucket: "movie-watchlist-7883c.firebasestorage.app",
messagingSenderId: "585421393583",
appId: "1:585421393583:web:b3c62cb16d99d8e3a18e5a"
};

const TMDB_API = "35a7c9cb588541cf79e297fbeb46e131";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const moviesRef = collection(db,"movies");
const commentsRef = collection(db,"comments");

const movieGrid = document.getElementById("movieGrid");
const watchedGrid = document.getElementById("watchedGrid");

const searchInput = document.getElementById("movieSearch");
const searchResults = document.getElementById("searchResults");

const randomBtn = document.getElementById("randomBtn");
const randomResult = document.getElementById("randomResult");

let movies = [];

async function searchMovie(queryText){

const response = await fetch(
`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API}&language=ru-RU&query=${queryText}`
);

const data = await response.json();

renderSearch(data.results.slice(0,8));

}

function renderSearch(results){

searchResults.innerHTML = "";

results.forEach(movie=>{

const card = document.createElement("div");
card.className = "search-item";

const poster = movie.poster_path
? `https://image.tmdb.org/t/p/w500${movie.poster_path}`
: "https://via.placeholder.com/500x750?text=Movie";

card.innerHTML = `
<img src="${poster}">

<div>
<h3>${movie.title}</h3>
<p>${movie.release_date || ""}</p>
</div>
`;

card.onclick = async ()=>{

await addDoc(moviesRef,{
title: movie.title,
desc: movie.overview,
poster,
watched:false,
createdAt: Date.now()
});

searchResults.innerHTML = "";
searchInput.value = "";

};

searchResults.appendChild(card);

});

}

searchInput.addEventListener("input",()=>{

if(searchInput.value.length < 2){
searchResults.innerHTML = "";
return;
}

searchMovie(searchInput.value);

});

function createMovieCard(movie,id){

const card = document.createElement("div");
card.className = "movie-card";

card.innerHTML = `

<img src="${movie.poster}">

<div class="movie-content">

<div class="movie-title">
${movie.title}
</div>

<div class="movie-desc">
${movie.desc || "Описание скоро появится 🍿"}
</div>

<div class="movie-buttons">

<button class="watch-btn">
${movie.watched ? "✅ Просмотрено" : "🍿 Посмотрели"}
</button>

<button class="delete-btn">
✖
</button>

</div>

<div class="comments">

<input
class="comment-input"
placeholder="Комментарий..."
>

<div class="comment-list"></div>

</div>

</div>
`;

const watchBtn = card.querySelector(".watch-btn");
const deleteBtn = card.querySelector(".delete-btn");
const commentInput = card.querySelector(".comment-input");
const commentList = card.querySelector(".comment-list");

watchBtn.onclick = async ()=>{

await updateDoc(doc(db,"movies",id),{
watched: !movie.watched
});

};

deleteBtn.onclick = async ()=>{

await deleteDoc(doc(db,"movies",id));

};

commentInput.addEventListener("keypress",async(e)=>{

if(e.key !== "Enter") return;

if(!commentInput.value.trim()) return;

await addDoc(commentsRef,{
movieId:id,
text:commentInput.value,
createdAt:Date.now()
});

commentInput.value = "";

});

onSnapshot(query(commentsRef,orderBy("createdAt")),snapshot=>{

commentList.innerHTML = "";

snapshot.forEach(docItem=>{

const comment = docItem.data();

if(comment.movieId !== id) return;

const div = document.createElement("div");
div.className = "comment";

div.textContent = comment.text;

commentList.appendChild(div);

});

});

if(movie.watched){
watchedGrid.appendChild(card);
}else{
movieGrid.appendChild(card);
}

}

onSnapshot(query(moviesRef,orderBy("createdAt","desc")),snapshot=>{

movieGrid.innerHTML = "";
watchedGrid.innerHTML = "";

movies = [];

snapshot.forEach(docItem=>{

const movie = docItem.data();

movies.push(movie);

createMovieCard(movie,docItem.id);

});

});

randomBtn.onclick = ()=>{

const available = movies.filter(m=>!m.watched);

if(!available.length) return;

const random =
available[Math.floor(Math.random()*available.length)];

randomResult.innerHTML = `
🍿 Сегодня ваш вечер:
<br><br>
<strong>${random.title}</strong>
`;

};

</script>

</body>
</html>
