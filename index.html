<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>❤️ Яна и Юра смотрят фильмы</title>

  <!-- Подключение премиальных шрифтов Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #09090b;
      --card: rgba(18, 18, 24, 0.7);
      --border: rgba(255, 255, 255, 0.05);
      --accent: #e2b774; /* Шампань / Золото */
      --accent-hover: #f1cf9b;
      --pink: #d946ef;
      --purple: #8b5cf6;
      --green: #10b981;
      --text: #f4f4f5;
      --muted: #8e8e9f;
      --shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(226, 183, 116, 0.04), transparent 30%),
        radial-gradient(circle at bottom right, rgba(217, 70, 239, 0.03), transparent 30%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 60px 20px;
      letter-spacing: -0.01em;
    }

    body::-webkit-scrollbar {
      width: 8px;
    }
    body::-webkit-scrollbar-track {
      background: var(--bg);
    }
    body::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
    body::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }

    body.netflix-theme {
      --bg: #050505;
      --card: rgba(15, 15, 15, 0.85);
      --border: rgba(229, 9, 20, 0.12);
      --accent: #e50914;
      --accent-hover: #ff1f2d;
      --pink: #e50914;
      --purple: #b20710;
      --green: #46d369;
      --text: #ffffff;
      --muted: #a3a3a3;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    .header-section {
      text-align: center;
      margin-bottom: 50px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 54px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 15px;
      background: linear-gradient(135deg, #ffffff 40%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 30px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .theme-buttons {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 50px;
      flex-wrap: wrap;
    }

    .theme-btn {
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
      color: var(--text);
      border-radius: 30px;
      padding: 10px 24px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      backdrop-filter: blur(10px);
    }

    .theme-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(226, 183, 116, 0.15);
      transform: translateY(-2px);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 24px;
      margin-bottom: 45px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 30px 20px;
      backdrop-filter: blur(20px);
      text-align: center;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .stat-card h3 {
      color: var(--muted);
      margin-bottom: 12px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 500;
    }

    .stat-card div {
      font-family: 'Playfair Display', serif;
      font-size: 44px;
      font-weight: 700;
      color: var(--text);
    }

    .progress-wrapper {
      margin-bottom: 60px;
      background: var(--card);
      padding: 24px;
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .progress-bar {
      height: 6px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--pink));
      transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 0 10px rgba(226, 183, 116, 0.3);
    }

    .progress-text {
      margin-top: 12px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .calendar-section {
      margin-bottom: 60px;
    }

    .calendar-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      margin-bottom: 25px;
      letter-spacing: -0.01em;
      text-align: center;
    }

    .heatmap {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 12px;
    }

    .heat-day {
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid var(--border);
      border-radius: 16px;
      min-height: 100px;
      padding: 14px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .heat-day:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
    }

    .heat-level-1 {
      background: rgba(226, 183, 116, 0.05);
      border-color: rgba(226, 183, 116, 0.15);
    }

    .heat-level-2 {
      background: rgba(226, 183, 116, 0.12);
      border-color: rgba(226, 183, 116, 0.3);
    }

    .heat-level-3 {
      background: rgba(226, 183, 116, 0.22);
      border-color: rgba(226, 183, 116, 0.5);
    }

    .heat-level-4 {
      background: rgba(226, 183, 116, 0.35);
      border-color: var(--accent);
      box-shadow: inset 0 0 10px rgba(226, 183, 116, 0.1);
    }

    .heat-emoji {
      font-size: 24px;
      align-self: center;
      margin: 4px 0;
    }

    .heat-date {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .heat-count {
      font-size: 11px;
      color: var(--accent);
      font-weight: 600;
      text-align: right;
    }

    .add-form {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 40px;
      margin-bottom: 60px;
      backdrop-filter: blur(25px);
      box-shadow: var(--shadow);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      align-items: end;
    }

    .form-grid > div {
      position: relative;
    }

    input,
    select {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      padding: 16px;
      border-radius: 14px;
      color: var(--text);
      font-size: 14px;
      transition: all 0.3s;
      outline: none;
      width: 100%;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.04);
      box-shadow: 0 0 15px rgba(226, 183, 116, 0.08);
    }

    select option {
      background: #0f0f14;
      color: var(--text);
    }

    .main-btn {
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), #c29b5c);
      color: #121218;
      padding: 16px 24px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.03em;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 15px rgba(226, 183, 116, 0.2);
    }

    .main-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(226, 183, 116, 0.35);
      filter: brightness(1.1);
    }

    #searchResults {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: absolute;
      width: 100%;
      z-index: 10;
    }

    .search-item {
      background: #121218;
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 14px;
      cursor: pointer;
      display: flex;
      gap: 12px;
      align-items: center;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
    }

    .search-item:hover {
      background: rgba(255,255,255,0.05);
      border-color: var(--accent);
    }

    .search-item img {
      width: 45px;
      height: 65px;
      object-fit: cover;
      border-radius: 8px;
    }

    .random-box {
      text-align: center;
      margin-bottom: 70px;
      background: var(--card);
      padding: 40px;
      border-radius: 28px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    #randomResult {
      margin-top: 25px;
      font-size: 24px;
      font-weight: 500;
      color: var(--muted);
      line-height: 1.6;
    }

    .category {
      margin-bottom: 70px;
    }

    .category h2 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      margin-bottom: 30px;
      font-weight: 600;
      position: relative;
      padding-bottom: 12px;
      letter-spacing: -0.01em;
    }

    .category h2::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 40px;
      height: 2px;
      background: var(--accent);
    }

    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 30px;
    }

    .movie-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      display: flex;
      gap: 20px;
      box-shadow: var(--shadow);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      backdrop-filter: blur(20px);
      position: relative;
      overflow: hidden;
    }

    .movie-card:hover {
      transform: translateY(-8px) scale(1.01);
      border-color: rgba(255, 255, 255, 0.12);
      box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8);
    }

    .movie-poster {
      width: 105px;
      min-width: 105px;
      height: 155px;
      object-fit: cover;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      transition: transform 0.3s;
    }

    .movie-card:hover .movie-poster {
      transform: scale(1.03);
    }

    .movie-info {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .movie-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 8px;
      color: var(--text);
    }

    .movie-desc {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 16px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .movie-meta {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
    }

    .movie-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .watch-btn,
    .fav-btn,
    .delete-btn {
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .watch-btn {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--border);
      color: var(--text);
    }

    .watch-btn:hover {
      background: var(--text);
      color: var(--bg);
      transform: translateY(-2px);
    }

    .fav-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 12px;
    }

    .fav-btn:hover {
      border-color: var(--pink);
      color: var(--pink);
      background: rgba(217, 70, 239, 0.05);
      transform: translateY(-2px);
    }

    .fav-btn.active-fav {
      background: rgba(217, 70, 239, 0.15);
      border-color: var(--pink);
      color: var(--pink);
      box-shadow: 0 0 10px rgba(217, 70, 239, 0.2);
    }

    .delete-btn {
      background: rgba(239, 68, 68, 0.05);
      border: 1px solid rgba(239, 68, 68, 0.15);
      color: #f87171;
      padding: 8px 12px;
    }

    .delete-btn:hover {
      background: #ef4444;
      color: white;
      border-color: #ef4444;
      transform: translateY(-2px);
    }

    .reactions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      padding-top: 15px;
      border-top: 1px solid var(--border);
    }

    .react-btn {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 30px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .react-btn:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: var(--accent);
      transform: scale(1.05);
    }

    .react-btn.active {
      background: rgba(226, 183, 116, 0.1);
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 10px rgba(226, 183, 116, 0.15);
    }

    .react-btn span {
      font-weight: 700;
      font-size: 11px;
    }

    .comment-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 13px;
      transition: all 0.3s;
      outline: none;
      margin-top: 15px;
    }

    .comment-input:focus {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.04);
      box-shadow: 0 0 15px rgba(226, 183, 116, 0.05);
    }

    .comment-list {
      margin-top: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 200px;
      overflow-y: auto;
      padding-right: 5px;
    }

    .comment-list::-webkit-scrollbar {
      width: 4px;
    }
    .comment-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .comment {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.5;
    }

    .comment-top {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    @media(max-width: 1024px) {
      .movie-grid {
        grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      }
    }

    @media(max-width: 768px) {
      h1 {
        font-size: 38px;
      }

      .movie-card {
        flex-direction: column;
        align-items: stretch;
      }

      .movie-poster {
        width: 100%;
        height: 240px;
      }

      .heatmap {
        grid-template-columns: repeat(3, 1fr);
      }

      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header-section">
    <h1>❤️ Яна и Юра смотрят фильмы ❤️</h1>
    <p class="subtitle">Ваш уютный кино-дневник 🍿</p>
    <div class="theme-buttons">
      <button class="theme-btn" id="themeNetflix">🎬 Netflix Dark</button>
      <button class="theme-btn" id="themePink">🌸 Velvet Plum</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <h3>🎬 Всего</h3>
      <div id="totalCount">0</div>
    </div>

    <div class="stat-card">
      <h3>✅ Посмотрели</h3>
      <div id="watchedCount">0</div>
    </div>

    <div class="stat-card">
      <h3>❤️ Избранное</h3>
      <div id="favCount">0</div>
    </div>
  </div>

  <div class="progress-wrapper">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText">
      Вы посмотрели 0% списка
    </div>
  </div>

  <div class="calendar-section">
    <div class="calendar-title">🔥 Heatmap ваших вечеров</div>
    <div class="heatmap" id="heatmap"></div>
  </div>

  <div class="add-form">
    <h2 style="font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 30px; text-align: center;">
      ➕ Добавить фильм
    </h2>

    <div class="form-grid">
      <div>
        <input id="titleInput" placeholder="Название фильма">
        <div id="searchResults"></div>
      </div>

      <input id="descInput" placeholder="Описание">

      <select id="categoryInput">
        <option>😂 Комедии</option>
        <option>❤️ Романтическое</option>
        <option>🔥 Телешоу</option>
        <option>🍿 Под чипсы</option>
        <option>🎬 Сериалы</option>
      </select>

      <input id="authorInput" placeholder="Кто добавил">

      <button class="main-btn" id="addBtn">Добавить</button>
    </div>
  </div>

  <div class="random-box">
    <button class="main-btn" id="randomBtn">🎲 Выбрать случайный фильм</button>
    <div id="randomResult"></div>
  </div>

  <div id="categories"></div>

  <div class="category">
    <h2>✅ Уже посмотрели</h2>
    <div class="movie-grid" id="watchedGrid"></div>
  </div>

</div>

<script type="module">
import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  deleteDoc,
  doc,
  updateDoc,
  onSnapshot,
  query,
  orderBy
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAjnuLCinerxH_q0IV28V_4GChZfB-g1Bg",
  authDomain: "movie-watchlist-7883c.firebaseapp.com",
  projectId: "movie-watchlist-7883c",
  storageBucket: "movie-watchlist-7883c.firebasestorage.app",
  messagingSenderId: "585421393583",
  appId: "1:585421393583:web:b3c62cb16d99d8e3a18e5a"
};

const TMDB_API = "35a7c9cb588541cf79e297fbeb46e131";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const moviesRef = collection(db,"movies");
const commentsRef = collection(db,"comments");
const reactionsRef = collection(db,"reactions");

const categoriesContainer = document.getElementById("categories");
const watchedGrid = document.getElementById("watchedGrid");

const categoryMap = {};
let selectedPoster = "";

if(localStorage.getItem("theme") === "netflix"){
  document.body.classList.add("netflix-theme");
}

document.getElementById("themeNetflix").onclick = ()=>{
  document.body.classList.add("netflix-theme");
  localStorage.setItem("theme","netflix");
};

document.getElementById("themePink").onclick = ()=>{
  document.body.classList.remove("netflix-theme");
  localStorage.setItem("theme","pink");
};

function createCategory(title){
  if(categoryMap[title]) return categoryMap[title];

  const section = document.createElement("div");
  section.className = "category";
  section.innerHTML = `
    <h2>${title}</h2>
    <div class="movie-grid"></div>
  `;

  categoriesContainer.appendChild(section);
  categoryMap[title] = section.querySelector(".movie-grid");
  return categoryMap[title];
}

function createMovieCard(movie,id){
  const card = document.createElement("div");
  card.className = "movie-card";

  card.innerHTML = `
    <img
      class="movie-poster"
      src="${movie.poster || 'https://via.placeholder.com/300x450?text=Movie'}"
    >
    <div class="movie-info">
      <div class="movie-title">${movie.title}</div>
      <div class="movie-desc">
        ${movie.desc || "Описание скоро появится 🍿"}
      </div>
      <div class="movie-meta">
        👤 Добавил: ${movie.author || "кто-то из вас"}
      </div>
      <div class="movie-actions">
        <button class="watch-btn">
          ${movie.watched ? "✅ Просмотрено" : "✅ Посмотрели"}
        </button>
        <button class="fav-btn ${movie.favorite ? "active-fav" : ""}">❤️</button>
        <button class="delete-btn">🗑️</button>
      </div>
      <div class="reactions">
        <button class="react-btn" data-emoji="❤️">❤️ <span>0</span></button>
        <button class="react-btn" data-emoji="😂">😂 <span>0</span></button>
        <button class="react-btn" data-emoji="😭">😭 <span>0</span></button>
        <button class="react-btn" data-emoji="🔥">🔥 <span>0</span></button>
        <button class="react-btn" data-emoji="🔞">🔞 <span>0</span></button>
      </div>
      <input class="comment-input" placeholder="Написать комментарий...">
      <div class="comment-list"></div>
    </div>
  `;

  const watchBtn = card.querySelector(".watch-btn");
  const favBtn = card.querySelector(".fav-btn");
  const deleteBtn = card.querySelector(".delete-btn");
  const commentInput = card.querySelector(".comment-input");
  const commentList = card.querySelector(".comment-list");
  const reactButtons = card.querySelectorAll(".react-btn");

  watchBtn.onclick = async ()=>{
    await updateDoc(doc(db,"movies",id), {
      watched: !movie.watched,
      watchedAt: Date.now()
    });
  };

  favBtn.onclick = async ()=>{
    await updateDoc(doc(db,"movies",id), {
      favorite: !movie.favorite
    });
  };

  deleteBtn.onclick = async ()=>{
    await deleteDoc(doc(db,"movies",id));
  };

  reactButtons.forEach(btn=>{
    btn.onclick = async ()=>{
      const emoji = btn.dataset.emoji;
      await addDoc(reactionsRef,{
        movieId:id,
        emoji,
        createdAt:Date.now()
      });
    };
  });

  onSnapshot(reactionsRef,(snapshot)=>{
    const counts = {};
    snapshot.forEach(docItem=>{
      const reaction = docItem.data();
      if(reaction.movieId !== id) return;
      counts[reaction.emoji] = (counts[reaction.emoji] || 0) + 1;
    });

    reactButtons.forEach(btn=>{
      const emoji = btn.dataset.emoji;
      const count = counts[emoji] || 0;
      btn.querySelector("span").textContent = count;
      if(count > 0){
        btn.classList.add("active");
      }else{
        btn.classList.remove("active");
      }
    });
  });

  commentInput.addEventListener("keypress", async(e)=>{
    if(e.key !== "Enter") return;
    if(!commentInput.value.trim()) return;

    await addDoc(commentsRef,{
      movieId:id,
      text:commentInput.value,
      createdAt:Date.now()
    });
    commentInput.value = "";
  });

  onSnapshot(
    query(commentsRef,orderBy("createdAt")),
    snapshot=>{
      commentList.innerHTML = "";
      snapshot.forEach(docItem=>{
        const comment = docItem.data();
        if(comment.movieId !== id) return;

        const date = new Date(comment.createdAt).toLocaleDateString("ru-RU",{
          day:"numeric",
          month:"short"
        });

        const div = document.createElement("div");
        div.className = "comment";
        div.innerHTML = `
          <div class="comment-top">
            <span>💬 Комментарий</span>
            <span>${date}</span>
          </div>
          <div>${comment.text}</div>
        `;
        commentList.appendChild(div);
      });
  });

  if(movie.watched){
    watchedGrid.appendChild(card);
  }else{
    createCategory(movie.category).appendChild(card);
  }
}

function renderHeatmap(movies){
  const heatmap = document.getElementById("heatmap");
  heatmap.innerHTML = "";

  const watchedMovies = movies.filter(m=>m.watched);
  const daysMap = {};

  watchedMovies.forEach(movie=>{
    if(!movie.watchedAt) return;

    const date = new Date(movie.watchedAt).toLocaleDateString("ru-RU");

    if(!daysMap[date]){
      daysMap[date] = {
        count:0,
        emoji:"🍿"
      };
    }
    daysMap[date].count++;

    if(movie.category.includes("❤️")){
      daysMap[date].emoji = "❤️";
    }
  });

  Object.entries(daysMap).forEach(([date,data])=>{
    const day = document.createElement("div");
    let level = "heat-level-1";

    if(data.count >= 2) level = "heat-level-2";
    if(data.count >= 3) level = "heat-level-3";
    if(data.count >= 4) level = "heat-level-4";

    day.className = `heat-day ${level}`;
    day.innerHTML = `
      <div class="heat-date">${date}</div>
      <div class="heat-emoji">${data.emoji}</div>
      <div class="heat-count">${data.count} ф.</div>
    `;
    heatmap.appendChild(day);
  });
}

function updateStats(movies){
  const total = movies.length;
  const watched = movies.filter(m=>m.watched).length;
  const favs = movies.filter(m=>m.favorite).length;

  document.getElementById("totalCount").textContent = total;
  document.getElementById("watchedCount").textContent = watched;
  document.getElementById("favCount").textContent = favs;

  const percent = total ? Math.round((watched/total)*100) : 0;
  document.getElementById("progressFill").style.width = percent + "%";
  document.getElementById("progressText").textContent = `Вы посмотрели ${percent}% списка`;
}

onSnapshot(moviesRef,(snapshot)=>{
  categoriesContainer.innerHTML = "";
  watchedGrid.innerHTML = "";

  Object.keys(categoryMap).forEach(key=>delete categoryMap[key]);
  const movies = [];

  snapshot.forEach((docItem)=>{
    const movie = docItem.data();
    movies.push(movie);
    createMovieCard(movie,docItem.id);
  });

  updateStats(movies);
  renderHeatmap(movies);
});

const titleInput = document.getElementById("titleInput");
const descInput = document.getElementById("descInput");

titleInput.addEventListener("input", async ()=>{
  const query = titleInput.value.trim();
  if(query.length < 2){
    document.getElementById("searchResults").innerHTML = "";
    return;
  }

  const response = await fetch(
    `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API}&language=ru-RU&query=${query}`
  );
  const data = await response.json();
  const results = data.results.slice(0,5);
  const searchResults = document.getElementById("searchResults");
  searchResults.innerHTML = "";

  results.forEach(movie=>{
    const div = document.createElement("div");
    div.className = "search-item";
    const poster = movie.poster_path ? `https://image.tmdb.org/t/p/w500${movie.poster_path}` : "";

    div.innerHTML = `
      <img src="${poster}">
      <div>
        <div style="font-weight:bold">${movie.title}</div>
        <div style="color:#8e8e9f; font-size:13px; margin-top:4px;">
          ${movie.release_date || ""}
        </div>
      </div>
    `;

    div.onclick = ()=>{
      titleInput.value = movie.title;
      descInput.value = movie.overview || "";
      selectedPoster = poster;
      searchResults.innerHTML = "";
    };
    searchResults.appendChild(div);
  });
});

document.getElementById("addBtn").onclick = async ()=>{
  const title = titleInput.value.trim();
  const desc = descInput.value.trim();
  const category = document.getElementById("categoryInput").value;
  const author = document.getElementById("authorInput").value.trim();

  if(!title) return;

  await addDoc(moviesRef,{
    title,
    desc,
    category,
    author,
    poster:selectedPoster,
    watched:false,
    favorite:false,
    createdAt:Date.now()
  });

  titleInput.value = "";
  descInput.value = "";
  document.getElementById("authorInput").value = "";
  selectedPoster = "";
};

document.getElementById("randomBtn").onclick = ()=>{
  const movies = [];
  document.querySelectorAll(".movie-card").forEach(card=>{
    const watched = card.querySelector(".watch-btn").textContent.includes("Просмотрено");
    if(!watched){
      movies.push(card.querySelector(".movie-title").textContent);
    }
  });

  if(!movies.length){
    document.getElementById("randomResult").innerHTML = "🍿 Вы уже всё посмотрели";
    return;
  }

  const random = movies[Math.floor(Math.random()*movies.length)];
  document.getElementById("randomResult").innerHTML = `
    🎬 Сегодня смотрите:
    <br><br>
    <span style="color:var(--accent); font-family:'Playfair Display', serif; font-size:36px; font-weight:700;">
      ${random}
    </span>
  `;
};
</script>
